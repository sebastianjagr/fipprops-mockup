<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Catalog — FIP-PROPS</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600&family=EB+Garamond:ital@0;1&family=Inter:wght@400;500&display=swap" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.24.0/dist/tabler-icons.min.css" rel="stylesheet"/>
<link href="assets/app.css" rel="stylesheet"/>
<script defer src="assets/products.js"></script>
<script defer src="assets/app.js"></script>
</head>
<body data-page="catalog">
<div class="page">
  <div class="wrap">
    <div class="cat-head">
      <div>
        <div class="page-title">Catalog</div>
        <div class="page-sub" id="subcount">medieval &amp; historical props for film</div>
      </div>
      <div class="search" style="flex:1;min-width:260px;max-width:440px">
        <i class="ti ti-search" style="color:var(--searchfg);font-size:19px"></i>
        <input id="q" placeholder="Search props or code…"/>
      </div>
    </div>

    <div class="cat-layout">
      <aside class="facets frost">
        <div class="fgroup"><h4>Category</h4><div id="catFacets"></div></div>
        <div class="fgroup">
          <h4>Period</h4>
          <div class="facet" data-g="period" data-v="Medieval"><i class="ti ti-square-check"></i> Medieval <span class="n" id="nMed"></span></div>
          <div class="facet off" data-g="period" data-v="19th century"><i class="ti ti-square"></i> 19th century <span class="n">0</span></div>
        </div>
        <div class="fgroup">
          <h4>Material</h4>
          <div class="facet" data-g="material" data-v="Oak / wood"><i class="ti ti-square-check"></i> Oak / wood <span class="n" id="nOak"></span></div>
          <div class="facet off" data-g="material" data-v="Wrought iron"><i class="ti ti-square"></i> Wrought iron <span class="n">0</span></div>
        </div>
        <div class="fgroup">
          <h4>Max price / week</h4>
          <input type="range" id="price" min="1000" max="15000" step="500" value="15000" style="width:100%"/>
          <div class="rng-l"><span>1 000 Kč</span><span id="priceLbl">15 000 Kč</span></div>
        </div>
      </aside>

      <div>
        <div class="result-bar">
          <b id="cnt" style="color:var(--headline)">—</b>
          <span id="filterNote"></span>
          <span style="margin-left:auto;display:flex;align-items:center;gap:8px">Sort
            <select id="sort" class="sortsel">
              <option value="rel">Relevance</option>
              <option value="lo">Price · low to high</option>
              <option value="hi">Price · high to low</option>
            </select>
          </span>
        </div>
        <div class="results" id="results"></div>
      </div>
    </div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded',function(){
  var P=window.FIP_PRODUCTS||[], CATS=window.FIP_CATS||[];
  P.forEach(function(p){p.period='Medieval';p.material='Oak / wood';});
  var params=new URLSearchParams(location.search);
  var state={cats:new Set(),period:new Set(['Medieval']),material:new Set(['Oak / wood']),q:'',max:15000,sort:'rel'};
  if(params.get('cat')&&CATS.indexOf(params.get('cat'))>=0)state.cats.add(params.get('cat'));
  if(params.get('q')){state.q=params.get('q');document.getElementById('q').value=state.q;}
  function fmt(n){return n.toLocaleString('cs-CZ');}
  function pass(p){
    if(state.cats.size&&!state.cats.has(p.cat))return false;
    if(state.period.size&&!state.period.has(p.period))return false;
    if(state.material.size&&!state.material.has(p.material))return false;
    if(state.q){var q=state.q.toLowerCase();if(p.name.toLowerCase().indexOf(q)<0&&p.code.toLowerCase().indexOf(q)<0&&p.cat.toLowerCase().indexOf(q)<0)return false;}
    if(p.price>state.max)return false;
    return true;
  }
  function renderFacets(){
    document.getElementById('catFacets').innerHTML=CATS.map(function(c){
      var n=P.filter(function(p){return p.cat===c}).length;
      var on=state.cats.has(c),off=state.cats.size&&!on;
      return '<div class="facet'+(off?' off':'')+'" data-c="'+c+'"><i class="ti ti-'+(on?'square-check':'square')+'"></i> '+c+' <span class="n">'+n+'</span></div>';
    }).join('');
    document.querySelectorAll('#catFacets .facet').forEach(function(el){el.onclick=function(){var c=el.getAttribute('data-c');if(state.cats.has(c))state.cats.delete(c);else state.cats.add(c);render();};});
  }
  function render(){
    renderFacets();
    var list=P.filter(pass);
    if(state.sort==='lo')list.sort(function(a,b){return a.price-b.price});
    else if(state.sort==='hi')list.sort(function(a,b){return b.price-a.price});
    document.getElementById('cnt').textContent=list.length+' props';
    document.getElementById('subcount').textContent=P.length+'+ medieval & historical props for film';
    var note=[];
    if(state.cats.size)note.push(Array.from(state.cats).join(', '));
    document.getElementById('filterNote').textContent=note.length?' · '+note.join(' · '):' · all categories';
    var r=document.getElementById('results');
    if(!list.length){r.innerHTML='<div class="empty">No props match these filters.</div>';return;}
    r.innerHTML=list.map(function(p){
      return '<a class="prop frost" href="item.html?code='+encodeURIComponent(p.code)+'">'
        +'<div class="ph"><img loading="lazy" src="'+p.img+'" alt="'+p.name+'"></div>'
        +'<div class="body"><div class="nm">'+p.name+'</div><div class="code">'+p.code+'</div>'
        +'<div class="pr"><span>'+fmt(p.price)+' Kč <small>/wk</small></span>'
        +'<span class="loc"><i class="ti ti-map-pin" style="font-size:12px"></i>'+p.loc+'</span></div></div></a>';
    }).join('');
  }
  function bindStatic(){
    document.querySelectorAll('.facet[data-g]').forEach(function(el){
      el.onclick=function(){
        var g=el.getAttribute('data-g'),v=el.getAttribute('data-v'),set=state[g];
        if(set.has(v))set.delete(v);else set.add(v);
        el.querySelector('i').className='ti ti-'+(set.has(v)?'square-check':'square');
        el.classList.toggle('off',!set.has(v));
        render();
      };
    });
  }
  function styleRange(el){var pct=(el.value-el.min)/(el.max-el.min)*100;el.style.background='linear-gradient(to right, var(--btnbg) '+pct+'%, var(--cardborder) '+pct+'%)';}
  var price=document.getElementById('price');
  document.getElementById('q').addEventListener('input',function(){state.q=this.value.trim();render();});
  document.getElementById('sort').addEventListener('change',function(){state.sort=this.value;render();});
  price.addEventListener('input',function(){state.max=+this.value;document.getElementById('priceLbl').textContent=fmt(+this.value)+' Kč';styleRange(this);render();});
  document.getElementById('nMed').textContent=P.length;
  document.getElementById('nOak').textContent=P.length;
  bindStatic();
  styleRange(price);
  render();
});
</script>
</body>
</html>
