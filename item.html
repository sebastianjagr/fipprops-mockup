<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Prop — FIP-PROPS</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600&family=EB+Garamond:ital@0;1&family=Inter:wght@400;500&display=swap" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.24.0/dist/tabler-icons.min.css" rel="stylesheet"/>
<link href="assets/app.css" rel="stylesheet"/>
<script defer src="assets/products.js"></script>
<script defer src="assets/app.js"></script>
</head>
<body data-page="catalog">
<div class="page">
  <div class="wrap">
    <div class="crumb"><a href="catalog.html">Catalog</a> · <a id="crumbCat" href="catalog.html">Props</a> · <span id="crumbName">Prop</span></div>

    <div class="item-layout">
      <div>
        <div class="gmain frost"><img id="mainImg" src="" alt=""/></div>
        <div class="gthumbs" id="thumbs"></div>
      </div>

      <div class="item-info frost">
        <div class="type" id="iType">Medieval</div>
        <h1 id="iName">Prop</h1>
        <div class="chips-lg" id="iChips"></div>
        <p class="idesc" id="iDesc"></p>

        <div class="price-big" id="iPrice"></div>
        <div style="font-size:12px;color:var(--muted)">Volume &amp; long-rental discounts applied at quote</div>

        <div class="avail">
          <div style="font-size:13px;color:var(--subtext);margin-bottom:10px">Check availability for your shoot</div>
          <div class="row">
            <span class="date"><i class="ti ti-calendar" style="font-size:14px;color:var(--btnbg)"></i> 12 Aug 2026</span>
            <i class="ti ti-arrow-right" style="color:var(--muted);font-size:15px"></i>
            <span class="date"><i class="ti ti-calendar" style="font-size:14px;color:var(--btnbg)"></i> 9 Sep 2026</span>
            <button class="btn-ghost">Check</button>
          </div>
          <div class="signin-note"><i class="ti ti-lock" style="font-size:13px"></i> Sign in as a studio to see live availability and pricing for your dates.</div>
        </div>

        <div class="row" style="display:flex;gap:10px">
          <button class="btn-primary"><i class="ti ti-heart" style="font-size:14px"></i> Add to wishlist</button>
          <button class="btn-ghost">Ask about this prop</button>
        </div>

        <table class="spec" id="iSpec"></table>
      </div>
    </div>

    <div class="more-row">
      <h3>More like this</h3>
      <div class="results" id="more"></div>
    </div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded',function(){
  var P=window.FIP_PRODUCTS||[];
  var code=new URLSearchParams(location.search).get('code');
  var p=P.filter(function(x){return x.code===code})[0]||P[0];
  function fmt(n){return n.toLocaleString('cs-CZ');}
  document.title=p.name+' — FIP-PROPS';
  document.getElementById('crumbCat').textContent=p.cat;
  document.getElementById('crumbCat').href='catalog.html?cat='+encodeURIComponent(p.cat);
  document.getElementById('crumbName').textContent=p.name;
  document.getElementById('mainImg').src=p.img;
  document.getElementById('iType').textContent=p.cat+' · medieval';
  document.getElementById('iName').textContent=p.name;
  document.getElementById('iChips').innerHTML='<span class="chip-lg">medieval</span><span class="chip-lg">oak / wood</span><span class="chip-lg">'+p.loc+'</span><span class="chip-lg">code '+p.code+'</span>';
  document.getElementById('iDesc').textContent='An original '+p.name.toLowerCase()+' from the FIP-PROPS collection, stored at our '+p.loc+' warehouse.';
  document.getElementById('iPrice').innerHTML=fmt(p.price)+' Kč <small>/ week</small>';
  var related=P.filter(function(x){return x.cat===p.cat&&x.code!==p.code});
  var thumbs=[p].concat(related.slice(0,3));
  document.getElementById('thumbs').innerHTML=thumbs.map(function(t){return '<div class="gthumb"><img loading="lazy" src="'+t.img+'" alt=""></div>';}).join('');
  document.getElementById('iSpec').innerHTML=
    '<tr><td>Category</td><td>'+p.cat+'</td></tr>'+
    '<tr><td>Period</td><td>Medieval</td></tr>'+
    '<tr><td>Material</td><td>Oak / wood</td></tr>'+
    '<tr><td>Warehouse</td><td>'+p.loc+'</td></tr>'+
    '<tr><td>Rental</td><td>'+fmt(p.price)+' Kč / week</td></tr>'+
    '<tr><td>Internal code</td><td>'+p.code+'</td></tr>';
  document.getElementById('more').innerHTML=related.slice(0,4).map(function(m){
    return '<a class="prop frost" href="item.html?code='+encodeURIComponent(m.code)+'">'
      +'<div class="ph"><img loading="lazy" src="'+m.img+'" alt="'+m.name+'"></div>'
      +'<div class="body"><div class="nm">'+m.name+'</div><div class="code">'+m.code+'</div>'
      +'<div class="pr"><span>'+fmt(m.price)+' Kč <small>/wk</small></span><span class="loc"><i class="ti ti-map-pin" style="font-size:12px"></i>'+m.loc+'</span></div></div></a>';
  }).join('');
});
</script>
</body>
</html>
