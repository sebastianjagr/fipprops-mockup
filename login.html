<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Client sign in — FIP-PROPS</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600&family=EB+Garamond:ital@0;1&family=Inter:wght@400;500&display=swap" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.24.0/dist/tabler-icons.min.css" rel="stylesheet"/>
<link href="assets/app.css" rel="stylesheet"/>
<script defer src="assets/app.js"></script>
</head>
<body data-page="login">
<div class="login-wrap">
  <div class="login-card frost">
    <div class="crest disp">FIP·PROPS</div>
    <h1>Client sign in</h1>
    <p class="hint">One shared account per studio. Sign in to browse pricing, check availability for your dates, build a wishlist and send rental requests.</p>
    <div class="fld">
      <label>Company account</label>
      <input type="email" placeholder="studio@example.com"/>
    </div>
    <div class="fld">
      <label>Password</label>
      <input type="password" placeholder="••••••••••"/>
    </div>
    <button class="signin">Sign in</button>
    <div class="login-foot">
      Each studio uses a single shared login.<br/>
      Need access for your production? <a href="#">Contact FIP-PROPS</a>
    </div>
  </div>
</div>
</body>
</html>
